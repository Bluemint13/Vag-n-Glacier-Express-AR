<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Glacier Express AR</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body { margin:0; }
</style>

</head>

<body>

<a-scene mindar-image="imageTargetSrc: targets.mind;" embedded>

<!-- VIDEO -->
<a-assets>
<video id="video" src="video.mp4" loop autoplay muted></video>
</a-assets>

<!-- PLANO DONDE APARECE EL VIDEO -->
<a-entity mindar-image-target="targetIndex: 0">

<a-video src="#video" position="0 0 0" width="1.5" height="1"></a-video>

</a-entity>

<a-camera position="0 0 0"></a-camera>

</a-scene>

</body>
</html>
